<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxy Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.5 12a8.5 8.5 0 1 1-8.5-8.5"/>
            <path d="M22 4v6h-6"/>
            <path d="M13.4 10.6a2.6 2.6 0 1 1-3.7 3.7"/>
          </svg>
        </div>
        <span class="header-title">Proxy settings</span>
        <div id="statusBadge" class="status-badge status-off">OFF</div>
      </header>

      <!-- Status bar -->
      <div id="statusBar" class="status-bar status-bar--inactive">
        <div class="status-dot"></div>
        <span id="statusText">Proxy is off</span>
      </div>

      <!-- Form -->
      <div class="form">
        <div class="form-group">
          <label class="label" for="protocol">Protocol</label>
          <select id="protocol" class="input">
            <option value="socks5">SOCKS5</option>
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group form-group--host">
            <label class="label" for="host">Server</label>
            <input
              type="text"
              id="host"
              class="input"
              placeholder="127.0.0.1"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="form-group form-group--port">
            <label class="label" for="port">Port</label>
            <input
              type="number"
              id="port"
              class="input"
              placeholder="1080"
              min="1"
              max="65535"
            />
          </div>
        </div>

        <div class="divider">
          <span>Authentication <span class="optional">(optional)</span></span>
        </div>

        <div class="form-group">
          <label class="label" for="username">Username</label>
          <input
            type="text"
            id="username"
            class="input"
            placeholder="Optional"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label class="label" for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="input"
              placeholder="Optional"
              autocomplete="off"
            />
            <button id="togglePassword" class="toggle-password" type="button" title="Show or hide password">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <label class="remember-password" for="rememberPassword">
          <input type="checkbox" id="rememberPassword" />
          <span>Store password on this device</span>
        </label>

        <label class="remember-password" for="latencyCheckEnabled">
          <input type="checkbox" id="latencyCheckEnabled" checked />
          <span>Show latency in status</span>
        </label>
      </div>

      <!-- Saved proxies -->
      <div id="savedSection" class="saved-section" style="display:none">
        <div class="saved-header">
          <span>Saved configurations</span>
        </div>
        <div id="savedList" class="saved-list"></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="saveBtn" class="btn btn--secondary" title="Save current configuration">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save preset
        </button>

        <button id="connectBtn" class="btn btn--primary">
          Turn on
        </button>

        <button id="disconnectBtn" class="btn btn--danger" style="display:none">
          Turn off
        </button>
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="error-msg" style="display:none"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloakr</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-icon">
          <img src="icons/logo.svg" width="20" height="20" alt="Cloakr logo" />
        </div>
        <span class="header-title">Cloakr</span>
        <div id="statusBadge" class="status-badge status-off">OFF</div>
      </header>

      <div id="statusBar" class="status-bar status-bar--inactive">
        <div class="status-dot"></div>
        <span id="statusText">Proxy is off</span>
      </div>

      <div class="form">
        <div class="form-group">
          <label class="label" for="protocolTrigger">Protocol</label>
          <div id="protocolSelect" class="protocol-select">
            <input type="hidden" id="protocol" value="http" />
            <button
              id="protocolTrigger"
              class="input protocol-trigger"
              type="button"
              aria-haspopup="listbox"
              aria-controls="protocolMenu"
              aria-expanded="false"
            >
              <span id="protocolLabel">HTTP</span>
              <svg class="protocol-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>
            <div id="protocolMenu" class="protocol-menu" role="listbox" aria-labelledby="protocolTrigger" hidden>
              <button type="button" class="protocol-option is-selected" data-protocol="http" role="option" aria-selected="true">HTTP</button>
              <button type="button" class="protocol-option" data-protocol="https" role="option" aria-selected="false">HTTPS</button>
              <button type="button" class="protocol-option" data-protocol="socks5" role="option" aria-selected="false">SOCKS5</button>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group--host">
            <label class="label" for="host">Server</label>
            <input
              type="text"
              id="host"
              class="input"
              placeholder="127.0.0.1"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="form-group form-group--port">
            <label class="label" for="port">Port</label>
            <input
              type="number"
              id="port"
              class="input"
              placeholder="1080"
              min="1"
              max="65535"
            />
          </div>
        </div>

        <div id="authSection">
          <div class="divider">
            <span>Authentication <span class="optional">(optional)</span></span>
          </div>

          <div class="form-group">
            <label class="label" for="username">Username</label>
            <input
              type="text"
              id="username"
              class="input"
              placeholder="Optional"
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label class="label" for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                class="input"
                placeholder="Optional"
                autocomplete="off"
              />
              <button id="togglePassword" class="toggle-password" type="button" title="Show or hide password">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <label class="remember-password" for="rememberPassword">
            <input type="checkbox" id="rememberPassword" />
            <span>Store password on this device</span>
          </label>
        </div>

      </div>

      <div id="savedSection" class="saved-section" style="display:none">
        <div class="saved-header">
          <span>Saved configurations</span>
        </div>
        <div id="savedList" class="saved-list"></div>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn btn--secondary" title="Save current configuration">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save preset
        </button>

        <button id="connectBtn" class="btn btn--primary">
          Turn on
        </button>

        <button id="disconnectBtn" class="btn btn--danger" style="display:none">
          Turn off
        </button>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none"></div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
